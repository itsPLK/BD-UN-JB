name: Dev Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ISO
        run: ./build_iso.sh

      - name: Create or Update Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build
          prerelease: true
          files: '*.iso'
